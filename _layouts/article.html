---
layout: default
---

<article>

  <header class="page__header">
    <h1>{{ page.title }}</h1>
  </header>

  {{ content }}

  <footer>
    <p class="page__meta">Published: {{ page.published | date: "%B %-d, %Y"}}</p>
    {% if page.last_modified %}
    <p class="page__meta">Last Updated: {{ page.last_modified | date: "%B %-d, %Y" }}</p>{% endif %}
  </footer>

</article>
